services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DOCKER_POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${DOCKER_POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${DOCKER_POSTGRES_DB:-appdb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DOCKER_POSTGRES_USER:-admin} -d ${DOCKER_POSTGRES_DB:-appdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
  seaweedfs:
    image: chrislusf/seaweedfs
    container_name: seaweedfs
    restart: unless-stopped
    ports:
      - "8333:8333"  # S3 API
      - "9333:9333"  # Master
      - "8080:8080"  # Volume
    volumes:
      - seaweedfs_data:/data
      - ./config/seaweedfs/s3.json:/etc/seaweedfs/s3.json
    command: server -s3 -s3.port=8333 -s3.config=/etc/seaweedfs/s3.json -dir=/data

  smtp4dev:
    image: rnwood/smtp4dev
    container_name: smtp4dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:80"    # веб-интерфейс
      - "127.0.0.1:2525:25"    # SMTP
    environment:
      - ServerOptions__HostName=smtp4dev

volumes:
  postgres_data:
    driver: local
  redis_data:
  seaweedfs_data:
