syntax = "proto3";

package sso;

option go_package = "cinema/gen/sso;sso";

import "buf/validate/validate.proto";

service Auth {
  rpc Register (RegisterRequest) returns (RegisterResponse);
  rpc Login (LoginRequest) returns (LoginResponse);
  rpc Refresh (RefreshRequest) returns (RefreshResponse);
  rpc Logout (LogoutRequest) returns (LogoutResponse);
  rpc ChangeRole (ChangeRoleRequest) returns (ChangeRoleResponse);
  rpc ChangeEmail (ChangeEmailRequest) returns (ChangeEmailResponse);
  rpc ChangePassword (ChangePasswordRequest) returns (ChangePasswordResponse);
  rpc ForgotPassword (ForgotPasswordRequest) returns (ForgotPasswordResponse);
  rpc ResetPassword (ResetPasswordRequest) returns (ResetPasswordResponse);
}

message RegisterRequest {
  string email = 1 [
    (buf.validate.field).string.email = true,
    (buf.validate.field).string.max_len = 254
  ];
  string password = 2 [
    (buf.validate.field).string.min_len = 8,
    (buf.validate.field).string.max_len = 72
  ];
}

message RegisterResponse {
  string user_id = 1;
}

message LoginRequest {
  string email = 1 [
    (buf.validate.field).string.email = true,
    (buf.validate.field).string.max_len = 254
  ];
  string password = 2 [
    (buf.validate.field).string.min_len = 8,
    (buf.validate.field).string.max_len = 72
  ];
  string device_id = 3 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 64
  ];
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message RefreshRequest {
  string refresh_token = 1 [(buf.validate.field).string.min_len = 1];
  string device_id = 2 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 64
  ];
}

message RefreshResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message LogoutRequest {
  string refresh_token = 1 [(buf.validate.field).string.min_len = 1];
  string device_id = 2 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 64
  ];
}

message LogoutResponse {}

message ChangeRoleRequest {
  string user_id = 1 [(buf.validate.field).string.uuid = true];
  string role = 2 [(buf.validate.field).string = {in: ["member", "admin"]}];
}

message ChangeRoleResponse {}

message ChangeEmailRequest {
  string new_email = 1 [
    (buf.validate.field).string.email = true,
    (buf.validate.field).string.max_len = 254
  ];
  string password = 2 [
    (buf.validate.field).string.min_len = 8,
    (buf.validate.field).string.max_len = 72
  ];
}

message ChangeEmailResponse {}

message ChangePasswordRequest {
  string old_password = 1 [
    (buf.validate.field).string.min_len = 8,
    (buf.validate.field).string.max_len = 72
  ];
  string new_password = 2 [
    (buf.validate.field).string.min_len = 8,
    (buf.validate.field).string.max_len = 72
  ];
}

message ChangePasswordResponse {}

message ForgotPasswordRequest {
  string email = 1 [
    (buf.validate.field).string.email = true,
    (buf.validate.field).string.max_len = 254
  ];
}

message ForgotPasswordResponse {}

message ResetPasswordRequest {
  string reset_token = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 64
  ];
  string new_password = 2 [
    (buf.validate.field).string.min_len = 8,
    (buf.validate.field).string.max_len = 72
  ];
}

message ResetPasswordResponse {}
